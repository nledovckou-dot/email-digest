name: Xray — Add VLESS Clients

on:
  workflow_dispatch:

jobs:
  add-clients:
    runs-on: ubuntu-latest
    steps:
      - name: Deep VPN recon
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            echo "=== IDENTITY ==="
            hostname
            cat /etc/hostname 2>/dev/null || true
            ip -4 addr show | grep "inet " || true

            echo "=== ALL LISTENING PORTS ==="
            ss -tlnp

            echo "=== REALITY pubkey search ==="
            grep -r "Zl6Z9zjzd1SPi3LwSoiquLMF5m3AxpsHsqqqegE" / --include="*.json" --include="*.yml" --include="*.yaml" --include="*.toml" --include="*.conf" 2>/dev/null | head -10 || echo "not found"

            echo "=== ALL non-kernel processes ==="
            ps aux | grep -v "\\[" | grep -v "grep"

            echo "=== systemctl ALL services ==="
            systemctl list-units --type=service --state=running 2>/dev/null

            echo "=== /usr/local/bin contents ==="
            ls -la /usr/local/bin/ 2>/dev/null || true

            echo "=== /root contents ==="
            ls -la /root/ 2>/dev/null || true

            echo "=== DONE ==="
