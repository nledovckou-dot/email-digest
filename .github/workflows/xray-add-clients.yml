name: Xray — Add VLESS Clients

on:
  workflow_dispatch:

jobs:
  add-clients:
    runs-on: ubuntu-latest
    steps:
      - name: Add 3 VLESS clients to Xray config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            set -e

            echo "=== RECON: find VPN proxy setup ==="

            # Search for existing UUID from user's keys
            echo "--- grep for known UUID ---"
            grep -r "2212799b-3210-4962-8e2e-06ef714615cb" /etc/ /opt/ /root/ /usr/local/ /var/lib/ 2>/dev/null || echo "not in common dirs"

            # Docker containers
            echo "--- docker containers ---"
            docker ps -a 2>/dev/null || echo "no docker"

            # All listening on port 443
            echo "--- port 443 ---"
            ss -tlnp | grep 443 || true

            # All systemd services with proxy-related names
            echo "--- systemd proxy services ---"
            systemctl list-units --type=service --all 2>/dev/null | grep -iE "xray|v2ray|sing|3x|x-ui|marzban|vless|proxy|vpn|reality" || echo "none found"

            # Process list
            echo "--- all processes ---"
            ps aux | grep -viE "grep|python|node|nginx|systemd|sshd|cron|docker|uvicorn" || true

            echo "=== RECON DONE ==="
